server {
    listen 80;
    server_name vexortech.com.br www.vexortech.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://www.vexortech.com.br$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name vexortech.com.br;

    ssl_certificate /etc/letsencrypt/live/www.vexortech.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.vexortech.com.br/privkey.pem;

    return 301 https://www.vexortech.com.br$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.vexortech.com.br;

    ssl_certificate /etc/letsencrypt/live/www.vexortech.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.vexortech.com.br/privkey.pem;

    location /_build/ {
        proxy_pass http://127.0.0.1:3000;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /assets/ {
        proxy_pass http://127.0.0.1:3000;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
}
